root = "."
tmp_dir = "/tmp/windforce-core-air-control-plane"

[build]
cmd = '''
go build -buildvcs=false -o /tmp/windforce-core-air-control-plane/windforce-core ./cmd/windforce-core
cat > /tmp/windforce-core-air-control-plane/run <<'EOF'
#!/bin/sh
exec /tmp/windforce-core-air-control-plane/windforce-core control-plane --dev --addr :8080 --state-backend postgres --database-url "$WINDFORCE_LITE_DATABASE_URL" --migrate --store /data/store --cache /data/cache --catalog /data/catalog.json --git-sources /data/git-sources.json
EOF
chmod +x /tmp/windforce-core-air-control-plane/run
'''
entrypoint = "/tmp/windforce-core-air-control-plane/run"
include_ext = ["go", "mod", "sum"]
exclude_dir = [".git", ".claude", ".serena", ".tmp", ".windforce-core", "tmp", "web"]
exclude_regex = ["_test\\.go"]
delay = 1000
poll = true
poll_interval = 500
stop_on_error = true
rerun = true
rerun_delay = 1000
send_interrupt = true
kill_delay = "2s"

[log]
time = true

[screen]
clear_on_rebuild = false
keep_scroll = true
