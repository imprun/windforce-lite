services:
  control-plane:
    image: ${WINDFORCE_LITE_DEV_IMAGE:-imprun/windforce-core-dev:local}
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command:
      - air
      - -c
      - .air.control-plane.toml
    environment:
      GOCACHE: /home/windforce/.cache/go-build
      GOMODCACHE: /go/pkg/mod
      WINDFORCE_LITE_DATABASE_URL: ${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_core?sslmode=disable}
      WINDFORCE_AUTH_SESSION_URL: ${WINDFORCE_AUTH_SESSION_URL:-}
      WINDFORCE_AUTH_SESSION_TOKEN: ${WINDFORCE_AUTH_SESSION_TOKEN:-}
      WINDFORCE_AUTH_SESSION_TOKEN_FILE: ${WINDFORCE_AUTH_SESSION_TOKEN_FILE:-}
      WINDFORCE_AUTH_SESSION_TIMEOUT_MS: ${WINDFORCE_AUTH_SESSION_TIMEOUT_MS:-15000}
    volumes:
      - .:/src
      - windforce-data:/data
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/windforce/.cache/go-build

  execution-api:
    image: ${WINDFORCE_LITE_DEV_IMAGE:-imprun/windforce-core-dev:local}
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command:
      - air
      - -c
      - .air.execution-api.toml
    environment:
      GOCACHE: /home/windforce/.cache/go-build
      GOMODCACHE: /go/pkg/mod
      WINDFORCE_LITE_DATABASE_URL: ${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_core?sslmode=disable}
    volumes:
      - .:/src
      - windforce-data:/data
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/windforce/.cache/go-build

  worker:
    image: ${WINDFORCE_LITE_DEV_IMAGE:-imprun/windforce-core-dev:local}
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command:
      - air
      - -c
      - .air.worker.toml
    environment:
      GOCACHE: /home/windforce/.cache/go-build
      GOMODCACHE: /go/pkg/mod
      WINDFORCE_LITE_DATABASE_URL: ${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_core?sslmode=disable}
      LOG_LEVEL: ${WINDFORCE_LITE_DEV_SCRIPT_LOG_LEVEL:-DEBUG}
      PYTHON_LOG_LEVEL: ${WINDFORCE_LITE_DEV_SCRIPT_LOG_LEVEL:-DEBUG}
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: utf-8
    volumes:
      - .:/src
      - windforce-data:/data
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/windforce/.cache/go-build

  webhook-dispatcher:
    image: ${WINDFORCE_LITE_DEV_IMAGE:-imprun/windforce-core-dev:local}
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command:
      - air
      - -c
      - .air.webhook-dispatcher.toml
    environment:
      GOCACHE: /home/windforce/.cache/go-build
      GOMODCACHE: /go/pkg/mod
      WINDFORCE_LITE_DATABASE_URL: ${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_core?sslmode=disable}
    volumes:
      - .:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/windforce/.cache/go-build

volumes:
  go-mod-cache:
  go-build-cache:
