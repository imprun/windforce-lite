# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: windforce

builds:
  - id: windforce
    main: ./cmd/windforce
    binary: windforce
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/imprun/windforce-core/internal/controlcli.Version={{.Version}}

archives:
  - ids:
      - windforce
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
