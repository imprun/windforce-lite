name: windforce-lite

x-windforce-lite-database-url: &windforce-lite-database-url "${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_lite?sslmode=disable}"

services:
  volume-init:
    profiles:
      - backend
      - worker
      - standalone
    image: alpine:3.20
    restart: "no"
    command: ["sh", "-lc", "chown -R 10001:999 /data"]
    volumes:
      - windforce-data:/data

  postgres:
    profiles:
      - pg
      - standalone
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WINDFORCE_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${WINDFORCE_POSTGRES_DB:-windforce_lite}
      POSTGRES_USER: ${WINDFORCE_POSTGRES_USER:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  control-plane:
    profiles:
      - backend
      - standalone
    image: ${WINDFORCE_LITE_IMAGE:-imprun/windforce-lite:local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        required: false
    ports:
      - "127.0.0.1:${WINDFORCE_LITE_API_PORT:-18091}:8080"
    command:
      - api
      - --addr
      - :8080
      - --state-backend
      - postgres
      - --database-url
      - *windforce-lite-database-url
      - --migrate
      - --store
      - /data/store
      - --catalog
      - /data/catalog.json
      - --git-sources
      - /data/git-sources.json
    volumes:
      - windforce-data:/data

  web:
    profiles:
      - backend
      - standalone
    image: oven/bun:1.3.12
    restart: unless-stopped
    working_dir: /app
    depends_on:
      control-plane:
        condition: service_started
        required: false
    ports:
      - "127.0.0.1:${WINDFORCE_LITE_WEB_PORT:-18090}:3000"
    environment:
      WINDFORCE_LITE_API_PROXY_TARGET: http://control-plane:8080
    command:
      - sh
      - -lc
      - bun install --frozen-lockfile && bun run dev:docker
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules

  worker:
    profiles:
      - worker
      - standalone
    image: ${WINDFORCE_LITE_IMAGE:-imprun/windforce-lite:local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
        required: false
    command:
      - worker
      - --state-backend
      - postgres
      - --database-url
      - *windforce-lite-database-url
      - --migrate
      - --store
      - /data/store
      - --cache
      - /data/cache
    environment:
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
      PIP_FIND_LINKS: ${PIP_FIND_LINKS:-}
      PIP_NO_INDEX: ${PIP_NO_INDEX:-}
      PIP_CERT: ${PIP_CERT:-}
      PIP_CLIENT_CERT: ${PIP_CLIENT_CERT:-}
    volumes:
      - windforce-data:/data

volumes:
  postgres-data:
  windforce-data:
    name: ${WINDFORCE_LITE_DATA_VOLUME:-windforce-lite_windforce-data}
    external: ${WINDFORCE_LITE_DATA_VOLUME_EXTERNAL:-false}
  web-node-modules:
