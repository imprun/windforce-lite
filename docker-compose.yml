name: windforce-core

x-windforce-core-database-url: &windforce-core-database-url "${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_core?sslmode=disable}"
x-windforce-core-secret-env: &windforce-core-secret-env
  SECRET_KEY: ${SECRET_KEY:-}
  SECRET_KEY_PREVIOUS: ${SECRET_KEY_PREVIOUS:-}

services:
  volume-init:
    profiles:
      - backend
      - worker
      - standalone
    image: alpine:3.20
    restart: "no"
    command: ["sh", "-lc", "chown -R 10001:999 /data"]
    volumes:
      - windforce-data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WINDFORCE_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${WINDFORCE_POSTGRES_DB:-windforce_core}
      POSTGRES_USER: ${WINDFORCE_POSTGRES_USER:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  control-plane:
    profiles:
      - backend
      - standalone
    image: ${WINDFORCE_LITE_IMAGE:-imprun/windforce-core:local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WINDFORCE_LITE_API_PORT:-18091}:8080"
    environment:
      <<: *windforce-core-secret-env
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
      PIP_FIND_LINKS: ${PIP_FIND_LINKS:-}
      PIP_NO_INDEX: ${PIP_NO_INDEX:-}
      PIP_CERT: ${PIP_CERT:-}
      PIP_CLIENT_CERT: ${PIP_CLIENT_CERT:-}
    command:
      - control-plane
      - --dev
      - --addr
      - :8080
      - --state-backend
      - postgres
      - --database-url
      - *windforce-core-database-url
      - --migrate
      - --store
      - /data/store
      - --cache
      - /data/cache
      - --catalog
      - /data/catalog.json
      - --git-sources
      - /data/git-sources.json
    volumes:
      - windforce-data:/data

  execution-api:
    profiles:
      - backend
      - worker
      - standalone
    image: ${WINDFORCE_LITE_IMAGE:-imprun/windforce-core:local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WINDFORCE_LITE_EXECUTION_API_PORT:-18092}:8080"
    environment:
      <<: *windforce-core-secret-env
    command:
      - execution-api
      - --dev
      - --addr
      - :8080
      - --state-backend
      - postgres
      - --database-url
      - *windforce-core-database-url
      - --migrate
      - --store
      - /data/store
      - --catalog
      - /data/catalog.json
    volumes:
      - windforce-data:/data

  web:
    profiles:
      - backend
      - standalone
    image: oven/bun:1.3.12
    restart: unless-stopped
    working_dir: /app
    depends_on:
      control-plane:
        condition: service_started
        required: false
    ports:
      - "127.0.0.1:${WINDFORCE_LITE_WEB_PORT:-18090}:3000"
    environment:
      WINDFORCE_LITE_API_PROXY_TARGET: http://control-plane:8080
    command:
      - sh
      - -lc
      - bun install --frozen-lockfile && bun run dev:docker
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules

  worker:
    profiles:
      - worker
      - standalone
    image: ${WINDFORCE_LITE_IMAGE:-imprun/windforce-core:local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      execution-api:
        condition: service_started
    command:
      - worker
      - --dev
      - --state-backend
      - postgres
      - --database-url
      - *windforce-core-database-url
      - --migrate
      - --store
      - /data/store
      - --cache
      - /data/cache
      - --base-url
      - http://execution-api:8080
    environment:
      <<: *windforce-core-secret-env
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
      PIP_FIND_LINKS: ${PIP_FIND_LINKS:-}
      PIP_NO_INDEX: ${PIP_NO_INDEX:-}
      PIP_CERT: ${PIP_CERT:-}
      PIP_CLIENT_CERT: ${PIP_CLIENT_CERT:-}
    volumes:
      - windforce-data:/data

  webhook-dispatcher:
    profiles:
      - backend
      - standalone
    image: ${WINDFORCE_LITE_IMAGE:-imprun/windforce-core:local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WINDFORCE_LITE_WEBHOOK_METRICS_PORT:-18093}:9090"
    command:
      - webhook-dispatcher
      - --dev
      - --state-backend
      - postgres
      - --database-url
      - *windforce-core-database-url
      - --migrate
    environment:
      <<: *windforce-core-secret-env
      WINDFORCE_LITE_WEBHOOK_DISPATCH_INTERVAL: ${WINDFORCE_LITE_WEBHOOK_DISPATCH_INTERVAL:-500ms}
      WINDFORCE_LITE_WEBHOOK_REQUEST_TIMEOUT: ${WINDFORCE_LITE_WEBHOOK_REQUEST_TIMEOUT:-10s}
      WINDFORCE_LITE_WEBHOOK_MAX_ATTEMPTS: ${WINDFORCE_LITE_WEBHOOK_MAX_ATTEMPTS:-8}
      WINDFORCE_LITE_WEBHOOK_LEASE_TTL: ${WINDFORCE_LITE_WEBHOOK_LEASE_TTL:-30s}
      WINDFORCE_LITE_WEBHOOK_ALLOWED_HOSTS: ${WINDFORCE_LITE_WEBHOOK_ALLOWED_HOSTS:-}
      WINDFORCE_LITE_WEBHOOK_ALLOWED_CIDRS: ${WINDFORCE_LITE_WEBHOOK_ALLOWED_CIDRS:-}
      WINDFORCE_LITE_WEBHOOK_ALLOW_INSECURE_LOOPBACK: ${WINDFORCE_LITE_WEBHOOK_ALLOW_INSECURE_LOOPBACK:-false}
      WINDFORCE_LITE_WEBHOOK_METRICS_ADDR: ${WINDFORCE_LITE_WEBHOOK_METRICS_ADDR:-:9090}
      WINDFORCE_LITE_WEBHOOK_SUCCESS_RETENTION_DAYS: ${WINDFORCE_LITE_WEBHOOK_SUCCESS_RETENTION_DAYS:-30}
      WINDFORCE_LITE_WEBHOOK_FAILURE_RETENTION_DAYS: ${WINDFORCE_LITE_WEBHOOK_FAILURE_RETENTION_DAYS:-90}
      WINDFORCE_LITE_WEBHOOK_RETENTION_INTERVAL: ${WINDFORCE_LITE_WEBHOOK_RETENTION_INTERVAL:-10m}
      WINDFORCE_LITE_WEBHOOK_RETENTION_BATCH_SIZE: ${WINDFORCE_LITE_WEBHOOK_RETENTION_BATCH_SIZE:-1000}
      WINDFORCE_LITE_WEBHOOK_RETENTION_TIME_BUDGET: ${WINDFORCE_LITE_WEBHOOK_RETENTION_TIME_BUDGET:-5s}

volumes:
  postgres-data:
    name: ${WINDFORCE_LITE_POSTGRES_VOLUME:-windforce-core_postgres-data}
    external: ${WINDFORCE_LITE_POSTGRES_VOLUME_EXTERNAL:-false}
  windforce-data:
    name: ${WINDFORCE_LITE_DATA_VOLUME:-windforce-core_windforce-data}
    external: ${WINDFORCE_LITE_DATA_VOLUME_EXTERNAL:-false}
  web-node-modules:

networks:
  default:
    name: ${WINDFORCE_LITE_NETWORK:-windforce-core}
