name: windforce-lite

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WINDFORCE_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${WINDFORCE_POSTGRES_DB:-windforce_lite}
      POSTGRES_USER: ${WINDFORCE_POSTGRES_USER:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  control-plane:
    image: ${WINDFORCE_LITE_IMAGE:-imprun/windforce-lite:local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WINDFORCE_LITE_API_PORT:-18090}:8080"
    command:
      - api
      - --addr
      - :8080
      - --state-backend
      - postgres
      - --database-url
      - postgres://${WINDFORCE_POSTGRES_USER:-postgres}@postgres:5432/${WINDFORCE_POSTGRES_DB:-windforce_lite}?sslmode=disable
      - --migrate
      - --store
      - /data/store
      - --catalog
      - /data/catalog.json
      - --git-sources
      - /data/git-sources.json
    volumes:
      - windforce-data:/data

volumes:
  postgres-data:
  windforce-data:
